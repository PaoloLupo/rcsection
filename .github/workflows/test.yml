name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: plugin

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build WASM plugin
        run: cargo build --release --target wasm32-unknown-unknown

  tests:
    runs-on: ubuntu-latest
    needs: rust-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: plugin

      - name: Install tytanic
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: tytanic@0.3.1

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Setup typst
        id: setup-typst
        uses: typst-community/setup-typst@v4

      - name: Build WASM plugin
        run: just plugin

      - name: Run test suite
        run: just test --no-fail-fast

      - name: Archive diffs
        uses: actions/upload-artifact@v4
        with:
          name: typst-${{ steps.setup-typst.outputs.typst-version }}-diffs
          path: |
            tests/**/diff/*.png
            tests/**/out/*.png
            tests/**/ref/*.png
          retention-days: 5
